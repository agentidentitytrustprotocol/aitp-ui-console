name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel previous runs when a new commit is pushed to the same PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --ci

      # Build catches the things type/lint can't — missing Suspense
      # boundaries, prerender errors, bad RSC boundaries.
      - name: Build
        run: npm run build
        env:
          # Build only reads env at static-render time; the BFF proxy reads
          # at request time. These placeholders just keep `next build` happy.
          PLAYGROUND_URL: http://localhost:8000
          CP_URL: http://localhost:4000
